<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/styles.css" />
    <title>Impostor Lol</title>
  </head>
  <body>
    <header class="header">
      <img
        src="./assets/images/logos/leagueOfImpostorLogo.png"
        alt="logo league of impostores"
      />
      <p>Descubre quien es el <span>impostor</span></p>
    </header>
    <main class="main">
      <div id="home-screen">
        <h2>Modo Local</h2>

        <p>
          Todos los jugadores utilizan el mismo dispositivo. Cada participante
          verá su rol en secreto antes de que comience la ronda.
        </p>

        <button id="play-local">Jugar modo local</button>
      </div>
      <div id="setup-screen" style="display: none">
        <div class="form-group">
          <label for="players">Cantidad de jugadores</label>
          <input type="number" id="players" min="3" max="20" value="4" />
        </div>

        <div class="form-group">
          <label for="impostors">Cantidad de impostores</label>
          <input type="number" id="impostors" min="1" max="5" value="1" />
        </div>

        <button id="create-game">Continuar</button>
        <button id="back-home">Volver</button>
        <div id="players-container"></div>
      </div>
      <div id="game-screen"></div>
    </main>
    <footer class="footer">
      <div class="footer__bottom">
        © 2026 League of Impostors. Fan-made project inspired by League of
        Legends.
      </div>
    </footer>
    <script src="./js/words.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
